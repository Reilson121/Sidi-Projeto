services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: projeto_sidi_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: sidiprojeto-back:latest
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/projeto_sidi_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required (define it in .env)}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  front:
    image: sidiprojeto-front:latest
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mysql_data:

networks:
  backend:
