spring.application.name=projeto-sidi-api

# --- Banco de Dados ---
# No Render, configure essas 3 variáveis de ambiente no painel do serviço.
# Localmente, você pode manter um .env ou sobrescrever com application-local.properties
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/projeto_sidi_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Gemini ---
gemini.api.key=${GEMINI_API_KEY:}

# --- Porta (o Render injeta a variável PORT automaticamente) ---
server.port=${PORT:8080}

# --- Docs ---
springdoc.api.docs.enabled=true